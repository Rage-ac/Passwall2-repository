name: Update PassWall2 Packages

on:
  schedule:
    # Check for new releases every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get upstream latest release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_JSON=$(gh api repos/Openwrt-Passwall/openwrt-passwall2/releases/latest)
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Upstream latest release: $TAG"

      - name: Get our latest release
        id: current
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "none")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Current release: $TAG"

      - name: Check if update needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch upstream and current release metadata
          upstream_json=$(gh api repos/Openwrt-Passwall/openwrt-passwall2/releases/latest)
          upstream_tag=$(echo "$upstream_json" | jq -r '.tag_name')
          current_json=$(gh api repos/${{ github.repository }}/releases/latest 2>/dev/null || echo '{}')
          current_tag=$(echo "$current_json" | jq -r '.tag_name // "none"')

          echo "Upstream tag: $upstream_tag"
          echo "Current tag: $current_tag"

          # If we have no current release, update
          if [ "$current_tag" = "none" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
            echo "No current release present; will update"
            exit 0
          fi

          need_update=0

          # 1) Simple check: tag change -> update
          if [ "$upstream_tag" != "$current_tag" ]; then
            echo "Tag changed: $upstream_tag (was $current_tag); will update"
            echo "update=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2) Per-arch asset count check
          # Upstream ships one passwall_packages_apk_<arch>.zip per architecture.
          # Our release ships one passwall2_signed_apk_<arch>.zip per architecture, plus a synthesized _noarch.zip.
          # Counts should match when our build is complete; a mismatch means upstream added arches OR our previous build was defective.
          upstream_arch_count=$(echo "$upstream_json" \
            | jq '[.assets[] | select((.name | startswith("passwall_packages_apk_")) and (.name | endswith(".zip")))] | length')
          current_arch_count=$(echo "$current_json" \
            | jq '[.assets[] | select((.name | startswith("passwall2_signed_apk_")) and (.name | endswith(".zip")) and ((.name | endswith("_noarch.zip")) | not))] | length')

          echo "Upstream per-arch zips: $upstream_arch_count, Current per-arch signed zips: $current_arch_count"

          if [ "$upstream_arch_count" -ne "$current_arch_count" ]; then
            echo "Per-arch zip count differs; will update"
            echo "update=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "update=false" >> "$GITHUB_OUTPUT"
          echo "Already up to date"

      - name: Download upstream release assets
        if: steps.check.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p downloads
          RELEASE_JSON=$(gh api repos/Openwrt-Passwall/openwrt-passwall2/releases/latest)

          # Download all APK-related assets
          echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("apk|.apk$")) | .browser_download_url' | while read -r url; do
            echo "Downloading: $(basename "$url")"
            curl -fsSL -o "downloads/$(basename "$url")" "$url"
          done

          ls -lh downloads/

      - name: Extract and organize packages
        if: steps.check.outputs.update == 'true'
        run: |
          mkdir -p packages

          # Extract architecture-specific ZIP archives
          for zip in downloads/passwall_packages_apk_*.zip; do
            [ -f "$zip" ] || continue
            ARCH=$(basename "$zip" .zip | sed 's/passwall_packages_apk_//')
            echo "Extracting packages for arch: $ARCH"
            mkdir -p "packages/$ARCH"
            unzip -o "$zip" -d "packages/$ARCH/"
          done

          # noarch directory: standalone APK files (luci-app, luci-i18n)
          mkdir -p packages/noarch
          for apk in downloads/*.apk; do
            [ -f "$apk" ] || continue
            cp "$apk" "packages/noarch/"
          done

          # Copy standalone APKs into each arch directory
          # Copy arch-specific packages into noarch (deps may resolve there)
          for dir in packages/*/; do
            [ "$(basename "$dir")" = "noarch" ] && continue
            for apk in downloads/*.apk; do
              [ -f "$apk" ] || continue
              cp "$apk" "$dir"
            done
            for apk in "$dir"*.apk; do
              [ -f "$apk" ] || continue
              cp -n "$apk" "packages/noarch/" 2>/dev/null
            done
          done

          echo "=== Package counts per arch ==="
          for dir in packages/*/; do
            echo "$(basename "$dir"): $(find "$dir" -name '*.apk' | wc -l) packages"
          done

      - name: Build apk-tools v3
        if: steps.check.outputs.update == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq meson ninja-build libssl-dev zlib1g-dev lua5.3 liblua5.3-dev scdoc cmake git
          git clone --depth 1 --branch v3.0.5 https://gitlab.alpinelinux.org/alpine/apk-tools.git /tmp/apk-tools
          cd /tmp/apk-tools
          meson setup build -Dprefix=/usr/local -Dlua=disabled -Ddocs=disabled
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig
          echo "apk-tools built:"
          apk --version

      - name: Sign packages and generate APKINDEX
        if: steps.check.outputs.update == 'true'
        run: |
          echo "${{ secrets.APK_SIGNING_KEY }}" > /tmp/passwall2-repo.rsa
          chmod 600 /tmp/passwall2-repo.rsa

          for dir in packages/*/; do
            arch=$(basename "$dir")
            echo "=== Processing: $arch ==="
            cd "$dir"

            echo "  Generating APKINDEX..."
            /usr/local/bin/apk mkndx \
              --allow-untrusted \
              --output APKINDEX.tar.gz \
              --sign /tmp/passwall2-repo.rsa \
              --description "PassWall2 packages for $arch" \
              *.apk 2>&1

            ls -la APKINDEX.tar.gz
            echo "  Done: $arch"
            cd "$GITHUB_WORKSPACE"
          done

          rm -f /tmp/passwall2-repo.rsa

          echo "=== Verification ==="
          find packages -name "APKINDEX.tar.gz" -exec ls -la {} \;

      - name: Prepare Pages artifact
        if: steps.check.outputs.update == 'true'
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"

          INDEX_COUNT=$(find packages -name "APKINDEX.tar.gz" | wc -l)
          echo "Found $INDEX_COUNT APKINDEX.tar.gz files"
          if [ "$INDEX_COUNT" -eq 0 ]; then
            echo "ERROR: No APKINDEX.tar.gz files found!"
            exit 1
          fi

          mkdir -p _site/packages
          cp -r packages/* _site/packages/

          # Copy public key
          mkdir -p _site/keys
          cp keys/passwall2-repo.rsa.pub _site/keys/

          echo "=== Site structure ==="
          du -sh _site/
          find _site -name "APKINDEX.tar.gz" | wc -l
          ls _site/packages/

      - name: Upload Pages artifact
        if: steps.check.outputs.update == 'true'
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.update == 'true'
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Create GitHub release
        if: steps.check.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"

          ASSETS=()

          # Per-arch signed ZIP archives
          for dir in packages/*/; do
            arch=$(basename "$dir")
            zipname="passwall2_signed_apk_${arch}.zip"
            (cd "$dir" && zip -r "../../${zipname}" *.apk 2>/dev/null) && ASSETS+=("$zipname")
          done

          echo "Creating release ${TAG} with ${#ASSETS[@]} assets..."

          BODY=$(gh api repos/Openwrt-Passwall/openwrt-passwall2/releases/latest --jq '.body // "No release notes"')

          cat > /tmp/release-notes.md <<NOTES
          ## PassWall2 ${TAG}

          Automatically synced from [upstream](https://github.com/Openwrt-Passwall/openwrt-passwall2/releases/tag/${TAG})

          All packages are signed with the repository key.

          ### APK Repository

          Add to your router:
          \`\`\`
          grep -q 'rage-ac.github.io/Passwall2' /etc/apk/repositories || echo "https://rage-ac.github.io/Passwall2/packages" >> /etc/apk/repositories
          apk update
          apk add luci-app-passwall2
          \`\`\`

          ### Upstream Release Notes
          ${BODY}

          ---
          *Auto-updated by GitHub Actions*
          NOTES

          # If a release with this tag already exists (defective build, manual rerun, etc.),
          # delete it first — gh release create cannot overwrite.
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists; deleting before recreating"
            gh release delete "$TAG" --yes --cleanup-tag --repo "${{ github.repository }}"
          fi

          gh release create "$TAG" \
            --title "PassWall2 ${TAG}" \
            --notes-file /tmp/release-notes.md \
            "${ASSETS[@]}"

          echo "Release created: ${TAG}"
