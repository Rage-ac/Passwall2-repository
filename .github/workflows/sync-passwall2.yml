name: Update PassWall2 Packages

on:
  schedule:
    # Check for new releases every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write
  pages: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get upstream latest release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_JSON=$(gh api repos/Openwrt-Passwall/openwrt-passwall2/releases/latest)
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Upstream latest release: $TAG"

      - name: Get our latest release
        id: current
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "none")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Current release: $TAG"

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" = "${{ steps.current.outputs.tag }}" ]; then
            echo "update=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date"
          else
            echo "update=true" >> "$GITHUB_OUTPUT"
            echo "New release available: ${{ steps.upstream.outputs.tag }}"
          fi

      - name: Download upstream release assets
        if: steps.check.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p downloads
          RELEASE_JSON=$(gh api repos/Openwrt-Passwall/openwrt-passwall2/releases/latest)

          # Download all APK-related assets
          echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("apk|.apk$")) | .browser_download_url' | while read -r url; do
            echo "Downloading: $(basename "$url")"
            curl -fsSL -o "downloads/$(basename "$url")" "$url"
          done

          ls -lh downloads/

      - name: Extract and organize packages
        if: steps.check.outputs.update == 'true'
        run: |
          mkdir -p packages

          # Extract architecture-specific ZIP archives
          for zip in downloads/passwall_packages_apk_*.zip; do
            [ -f "$zip" ] || continue
            ARCH=$(basename "$zip" .zip | sed 's/passwall_packages_apk_//')
            echo "Extracting packages for arch: $ARCH"
            mkdir -p "packages/$ARCH"
            unzip -o "$zip" -d "packages/$ARCH/"
          done

          # Copy standalone APK files (luci-app, luci-i18n) to each arch directory AND noarch
          mkdir -p packages/noarch
          for apk in downloads/*.apk; do
            [ -f "$apk" ] || continue
            cp "$apk" "packages/noarch/"
            for dir in packages/*/; do
              [ "$(basename "$dir")" = "noarch" ] && continue
              cp "$apk" "$dir"
            done
          done

          echo "=== Package counts per arch ==="
          for dir in packages/*/; do
            echo "$(basename "$dir"): $(find "$dir" -name '*.apk' | wc -l) packages"
          done

      - name: Build apk-tools v3
        if: steps.check.outputs.update == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq meson ninja-build libssl-dev zlib1g-dev lua5.3 liblua5.3-dev scdoc cmake git
          git clone --depth 1 --branch v3.0.5 https://gitlab.alpinelinux.org/alpine/apk-tools.git /tmp/apk-tools
          cd /tmp/apk-tools
          meson setup build -Dprefix=/usr/local -Dlua=disabled -Ddocs=disabled
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig
          echo "apk-tools built:"
          apk --version

      - name: Sign packages and generate APKINDEX
        if: steps.check.outputs.update == 'true'
        run: |
          echo "${{ secrets.APK_SIGNING_KEY }}" > /tmp/passwall2-repo.rsa
          chmod 600 /tmp/passwall2-repo.rsa

          for dir in packages/*/; do
            arch=$(basename "$dir")
            echo "=== Processing: $arch ==="
            cd "$dir"

            # Generate APKINDEX with apk-tools v3 (--allow-untrusted for upstream-signed packages)
            echo "  Generating APKINDEX..."
            /usr/local/bin/apk mkndx \
              --allow-untrusted \
              --output APKINDEX.tar.gz \
              --sign /tmp/passwall2-repo.rsa \
              --description "PassWall2 packages for $arch" \
              *.apk 2>&1

            ls -la APKINDEX.tar.gz
            echo "  Done: $arch"
            cd "$GITHUB_WORKSPACE"
          done

          rm -f /tmp/passwall2-repo.rsa

          echo "=== Verification ==="
          find packages -name "APKINDEX.tar.gz" -exec ls -la {} \;

      - name: Deploy APK repository to gh-pages
        if: steps.check.outputs.update == 'true'
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"

          # Verify APKINDEX files before deploy
          INDEX_COUNT=$(find packages -name "APKINDEX.tar.gz" | wc -l)
          echo "Found $INDEX_COUNT APKINDEX.tar.gz files"
          if [ "$INDEX_COUNT" -eq 0 ]; then
            echo "ERROR: No APKINDEX.tar.gz files found!"
            exit 1
          fi

          # Prepare gh-pages content
          mkdir -p deploy/packages
          cp -r packages/* deploy/packages/

          # Copy public key
          mkdir -p deploy/keys
          cp keys/passwall2-repo.rsa.pub deploy/keys/

          # Create repo info page
          cat > deploy/packages/index.html <<'PAGEEOF'
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>APK Repository Index</title></head>
          <body><h1>PassWall2 APK Repository</h1><ul>
          PAGEEOF

          for dir in deploy/packages/*/; do
            arch=$(basename "$dir")
            echo "<li><a href=\"${arch}/\">${arch}</a></li>" >> deploy/packages/index.html
          done

          echo '</ul></body></html>' >> deploy/packages/index.html

          # Deploy to gh-pages
          cd deploy
          git init
          git checkout -b gh-pages
          git add .
          git -c user.name="github-actions" -c user.email="actions@github.com" \
            commit -m "Update APK repository: ${TAG}"

          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin gh-pages

          echo "APK repository deployed to gh-pages"

      - name: Create GitHub release
        if: steps.check.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"

          ASSETS=()

          # Per-arch signed ZIP archives
          for dir in packages/*/; do
            arch=$(basename "$dir")
            zipname="passwall2_signed_apk_${arch}.zip"
            (cd "$dir" && zip -r "../../${zipname}" *.apk 2>/dev/null) && ASSETS+=("$zipname")
          done

          echo "Creating release ${TAG} with ${#ASSETS[@]} assets..."

          BODY=$(gh api repos/Openwrt-Passwall/openwrt-passwall2/releases/latest --jq '.body // "No release notes"')

          cat > /tmp/release-notes.md <<NOTES
          ## PassWall2 ${TAG}

          Automatically synced from [upstream](https://github.com/Openwrt-Passwall/openwrt-passwall2/releases/tag/${TAG})

          All packages are signed with the repository key.

          ### APK Repository

          Add to your router:
          \`\`\`
          echo "https://rage-ac.github.io/Passwall2/packages" >> /etc/apk/repositories
          apk update
          apk add luci-app-passwall2
          \`\`\`

          ### Upstream Release Notes
          ${BODY}

          ---
          *Auto-updated by GitHub Actions*
          NOTES

          gh release create "$TAG" \
            --title "PassWall2 ${TAG}" \
            --notes-file /tmp/release-notes.md \
            "${ASSETS[@]}"

          echo "Release created: ${TAG}"
